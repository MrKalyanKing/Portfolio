<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Admin brand gradient: primary #0058bc → secondary #8d2ebc,
         same recipe as .liquid-glass-btn-primary -->
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0070eb"/>
      <stop offset="0.5" stop-color="#0058bc"/>
      <stop offset="1" stop-color="#8d2ebc"/>
    </linearGradient>
    <!-- Glassy top-left sheen -->
    <radialGradient id="sheen" cx="0.3" cy="0.22" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect width="512" height="512" rx="116" fill="url(#sheen)"/>
  <!-- Liquid-glass inner edge highlight -->
  <rect x="7" y="7" width="498" height="498" rx="110" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="8"/>

  <!-- Geometric K — same construction as the portfolio mark -->
  <g stroke="#ffffff" stroke-width="66" stroke-linecap="round" fill="none">
    <path d="M 168 136 L 168 376"/>
    <path d="M 344 136 L 200 264"/>
    <path d="M 216 244 L 348 376"/>
  </g>

  <!-- Cursor accent -->
  <rect x="380" y="352" width="34" height="46" rx="9" fill="#ffffff" opacity="0.85"/>
</svg>
