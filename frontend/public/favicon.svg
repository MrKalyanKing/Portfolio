<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Brand emerald gradient (portfolio accent #34d399) -->
    <linearGradient id="kGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ff5cd"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#0bc793"/>
    </linearGradient>
    <!-- Soft ambient glow behind the letter -->
    <radialGradient id="glow" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#34d399" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <!-- Dark tile with a hint of the site's deep-green surface -->
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1714"/>
      <stop offset="0.55" stop-color="#060907"/>
      <stop offset="1" stop-color="#04140d"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>
  <!-- Subtle inner edge highlight -->
  <rect x="7" y="7" width="498" height="498" rx="110" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>

  <!-- Geometric K -->
  <g stroke="url(#kGrad)" stroke-width="66" stroke-linecap="round" fill="none">
    <path d="M 168 136 L 168 376"/>
    <path d="M 344 136 L 200 264"/>
    <path d="M 216 244 L 348 376"/>
  </g>

  <!-- Terminal cursor accent -->
  <rect x="380" y="352" width="34" height="46" rx="9" fill="#34d399" opacity="0.9"/>
</svg>
